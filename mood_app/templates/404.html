<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷路了 - 心情日记</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f8f7fc; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
        .container { padding:40px; }
        .emoji { font-size:80px; animation: bounce 1.5s infinite; }
        @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-20px); } }
        h1 { font-size:24px; color:#18181b; margin:20px 0 10px; }
        p { color:#71717a; margin-bottom:24px; font-size:15px; }
        a { display:inline-block; padding:12px 28px; background:#7c3aed; color:#fff; border-radius:24px; text-decoration:none; font-weight:600; transition:0.2s; }
        a:hover { background:#6d28d9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🗺️</div>
        <h1>哎呀，迷路了</h1>
        <p>这里什么都没有，可能是心情太乱走丢了</p>
        <a href="/">← 回到心情日记</a>
    </div>
</body>
</html>
