<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FCF9F6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="心情日记">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌈</text></svg>">
    <link rel="manifest" href="/static/manifest.json">
    <title>心情日记 — 记录每一刻</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar-left" id="sidebar-left">
            <div class="sidebar-logo" onclick="navigate('feed')"><span class="logo-icon"></span>心情日记</div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <button class="btn btn-primary btn-lg sidebar-post-btn" id="sidebar-post-btn" style="display:none">✨ 发布心情</button>
            <div class="sidebar-user" id="sidebar-user"></div>
        </aside>

        <main class="main-content" id="main-content">
            <div id="app"></div>
        </main>

        <aside class="sidebar-right" id="sidebar-right">
            <div id="right-panel"></div>
        </aside>
    </div>

    <!-- Mobile bottom nav -->
    <nav class="mobile-nav" id="mobile-nav">
        <a data-view="feed"><span class="mn-icon mn-icon-home"></span><span class="mn-label">首页</span></a>
        <a data-view="friends"><span class="mn-icon mn-icon-users"></span><span class="mn-label">好友</span></a>
        <a data-view="post" id="mn-post-btn"><span class="mn-icon mn-icon-plus"></span><span class="mn-label">发布</span></a>
        <a data-view="families"><span class="mn-icon mn-icon-family"></span><span class="mn-label">家庭</span></a>
        <a data-view="profile"><span class="mn-icon mn-icon-user"></span><span class="mn-label">个人</span></a>
    </nav>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay" style="display:none">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- Image viewer -->
    <div class="image-viewer" id="image-viewer" style="display:none">
        <span class="image-viewer-close" onclick="closeImg()">&times;</span>
        <img id="image-viewer-img" src="" alt="预览">
    </div>

    <div id="toast" class="toast"></div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
    <script src="/static/app.js"></script>
</body>
</html>
